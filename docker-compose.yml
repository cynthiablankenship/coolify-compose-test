services:
  web:
    build: .
    environment:
      PORT: "3000"
      REDIS_URL: "redis://redis:6379"
      APP_MESSAGE: "${APP_MESSAGE:-Default message from docker-compose.yml}"
    ports:
      - "3003:3000"
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  redis-data:
